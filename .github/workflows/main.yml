name: ML CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # Inject GitHub Secret
    env:
      BEST_MSE: ${{ secrets.BEST_MSE }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:

      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 3: Train model
      - name: Train model
        run: python train.py

      # Step 4: Student Identity
      - name: Student Identity
        run: |
          echo "Name: Krishnajith | Roll No: 2022BCS0037"

      # Step 5: Extract MSE
      - name: Extract MSE
        run: |
          MSE=$(python -c "import json;print(json.load(open('metrics.json'))['mse'])")
          echo "MSE=$MSE" >> $GITHUB_ENV

      # Step 6: Compare Performance (Fixed)
      - name: Compare performance
        run: |
          echo "MSE is $MSE"
          echo "BEST_MSE is $BEST_MSE"

          if [ "$(echo "$MSE < $BEST_MSE" | awk '{print ($1 < $3)}')" = "1" ]; then
            echo "DEPLOY=true" >> $GITHUB_ENV
          else
            echo "DEPLOY=false" >> $GITHUB_ENV
          fi

      # Step 7: Build Docker Image (Conditional)
      - name: Build Docker Image
        if: env.DEPLOY == 'true'
        run: docker build -t mymodel .

      # Step 8: Login to DockerHub
      - name: Login to DockerHub
        if: env.DEPLOY == 'true'
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      # Step 9: Push Docker Image
      - name: Push Docker Image
        if: env.DEPLOY == 'true'
        run: |
          docker tag mymodel $DOCKERHUB_USERNAME/mymodel:latest
          docker push $DOCKERHUB_USERNAME/mymodel:latest